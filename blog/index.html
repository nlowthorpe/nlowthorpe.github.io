---
layout: base.html
title: Blog
---

<h1>Blog</h1>

<ul class="post-list">
  {% for post in collections.posts %}
  <li style="margin-bottom: 1rem;">
    <a href="{{ post.url }}">
      <strong>{{ post.data.title }}</strong><br>
      <small>{{ post.date | date: "%d %b %Y" }}</small>
    </a>
  </li>
  {% endfor %}
</ul>
