<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{{ '/assets/styles.css' | url }}">
  <script>
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>

<body>
  <div class="layout-container">
    <aside class="sidebar">
      <button class="theme-toggle" aria-label="Toggle Dark Mode" id="theme-toggle">
        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>

      <div class="profile-container">
        <div class="profile-circle">
          <img src="{{ '/assets/me.jpg' | url }}" alt="Profile avatar">
        </div>
        <h2 class="profile-name" style="margin-bottom: 0;">Nicholas Lowthorpe</h2>
        <p
          style="font-size: 0.85rem; color: var(--text-secondary); text-align: center; font-weight: 400; max-width: 280px; margin-top: 0.5rem;">
          Lead Technical Business Analyst - Leading digital & data transformations</p>

        <div class="social-links" style="display: flex; gap: 1rem; justify-content: center;">
          <a href="https://www.linkedin.com/in/nicholaslowthorpe/" target="_blank" aria-label="LinkedIn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
            </svg>
          </a>
          <a href="mailto:nick.lowthorpe@googlemail.com" aria-label="Email">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M0 3v18h24v-18h-24zm21.518 2l-9.518 7.713-9.518-7.713h19.036zm-19.518 14v-11.817l10 8.104 10-8.104v11.817h-20z" />
            </svg>
          </a>
        </div>
      </div>

      <nav class="main-nav">
        <a href="{{ '/' | url }}">Home</a>
        <a href="{{ '/posts/' | url }}">Blog</a>
        <a href="{{ '/about/' | url }}">About Me</a>
      </nav>
    </aside>

    <main class="content">
      {{ content }}
    </main>
  </div>

  <script>
    const themeToggleBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    
    function updateIcon(theme) {
      if (theme === 'dark') {
        // Sun icon for dark mode (click to switch to light)
        themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
      } else {
        // Moon icon for light mode (click to switch to dark)
        themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
      }
    }

    // Set initial icon based on HTML data-theme attribute
    const initialTheme = document.documentElement.getAttribute('data-theme');
    updateIcon(initialTheme);

    themeToggleBtn.addEventListener('click', () => {
      let currentTheme = document.documentElement.getAttribute('data-theme');
      let targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      document.documentElement.setAttribute('data-theme', targetTheme);
      localStorage.setItem('theme', targetTheme);
      updateIcon(targetTheme);
    });
  </script>
</body>

</html>
