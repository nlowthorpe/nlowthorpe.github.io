<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{{ '/assets/styles.css' | url }}">
</head>

<body>
  <div class="layout-container">
    <aside class="sidebar">
      <div class="profile-container">
        <div class="profile-circle">
          <img src="{{ '/assets/me.jpg' | url }}" alt="Profile avatar">
        </div>
        <h2 class="profile-name" style="margin-bottom: 0;">Nicholas Lowthorpe</h2>
        <p
          style="font-size: 0.85rem; color: var(--text-secondary); text-align: center; font-weight: 400; max-width: 280px; margin-top: 0.5rem;">
          Lead Technical Business Analyst - Leading digital & data transformations</p>

        <div class="social-links" style="display: flex; gap: 1rem; justify-content: center;">
          <a href="https://www.linkedin.com/in/nicholaslowthorpe/" target="_blank" aria-label="LinkedIn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
            </svg>
          </a>
          <a href="mailto:nick.lowthorpe@googlemail.com" aria-label="Email">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M0 3v18h24v-18h-24zm21.518 2l-9.518 7.713-9.518-7.713h19.036zm-19.518 14v-11.817l10 8.104 10-8.104v11.817h-20z" />
            </svg>
          </a>
        </div>
      </div>

      <nav class="main-nav">
        <a href="{{ '/' | url }}">Home</a>
        <a href="{{ '/posts/' | url }}">Blog</a>
        <a href="{{ '/about/' | url }}">About Me</a>
      </nav>
    </aside>

    <main class="content">
      {{ content }}
    </main>
  </div>
</body>

</html>
